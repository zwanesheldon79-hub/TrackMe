<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackMe</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>TrackMe</h1>
</header>

<div class="container">

    <div class="calendar-section">
        <h2 id="monthTitle"></h2>
        <div id="calendar"></div>
    </div>

    <div class="tasks-section">

        <h2 id="selectedDate">Select a Day</h2>

        <div class="task-form">

            <input type="text"
                   id="taskTitle"
                   placeholder="Task Name">

            <input type="time"
                   id="taskTime">

            <input type="number"
                   id="taskDuration"
                   placeholder="Duration (min)">

            <select id="taskCategory">
                <option value="green">Green - Important</option>
                <option value="blue">Blue - Ambition</option>
                <option value="red">Red - Urgent</option>
                <option value="brown">Brown - Habit</option>
            </select>

            <button onclick="addTask()">Add Task</button>

        </div>

<div id="dailyScore"></div>

<button id="doNowBtn" onclick="suggestNextTask()">
    🎯 WHAT SHOULD I DO NOW?
</button>

        <div id="taskList"></div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
